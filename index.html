<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Floom iPhone Version</title>
<style>
  body { margin:0; overflow:hidden; font-family:sans-serif; }
  video {
    position: fixed;
    top:0; left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
  }
  #info {
    position:absolute;
    top:10px; left:10px;
    color:white;
    background:rgba(0,0,0,0.6);
    padding:10px;
    border-radius:10px;
  }
</style>
</head>

<body>

<video id="camera" autoplay playsinline></video>
<div id="info">Tap to place Earth</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<script>
const video = document.getElementById("camera");

// 📷 Камера
navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" },
  audio: false
}).then(stream => {
  video.srcObject = stream;
}).catch(err => {
  alert("Camera error: " + err);
});

// 🎬 THREE
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.01, 100);
camera.position.z = 1;

const renderer = new THREE.WebGLRenderer({ alpha:true, antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// 🌍 Земля
const geometry = new THREE.SphereGeometry(0.3, 64, 64);
const texture = new THREE.TextureLoader().load(
  "https://threejs.org/examples/textures/earth_atmos_2048.jpg"
);
const material = new THREE.MeshStandardMaterial({ map:texture });
const earth = new THREE.Mesh(geometry, material);
scene.add(earth);
earth.visible = false;

// 🔴 маркер
const marker = new THREE.Mesh(
  new THREE.SphereGeometry(0.01, 16, 16),
  new THREE.MeshBasicMaterial({ color:0xff0000 })
);
scene.add(marker);

// 🕳️ туннель
const tunnel = new THREE.Mesh(
  new THREE.CylinderGeometry(0.01,0.01,1,16),
  new THREE.MeshBasicMaterial({ color:0x00ffff, wireframe:true })
);
scene.add(tunnel);
tunnel.visible = false;

// 💡 свет
scene.add(new THREE.HemisphereLight(0xffffff,0xbbbbff,1));

let placed = false;

function toLatLon(p){
  const lat = 90 - (Math.acos(p.y)*180/Math.PI);
  const lon = ((Math.atan2(p.z,p.x)*180/Math.PI)+180)%360-180;
  return {lat,lon};
}

function antipode(lat,lon){
  return {
    lat:-lat,
    lon: lon>0 ? lon-180 : lon+180
  };
}

// 👆 тап
window.addEventListener("click", ()=>{

  if(!placed){
    earth.position.set(0,0,-1.5);
    earth.visible = true;
    placed = true;
    document.getElementById("info").innerText = "Tap center to explore";
    return;
  }

  const raycaster = new THREE.Raycaster();
  raycaster.setFromCamera({x:0,y:0}, camera);

  const hit = raycaster.intersectObject(earth);

  if(hit.length){
    const point = hit[0].point.clone().sub(earth.position).normalize();

    // маркер
    marker.position.copy(point).add(earth.position);

    // туннель
    tunnel.visible = true;
    tunnel.position.copy(earth.position);

    const dir = point.clone().normalize();
    tunnel.lookAt(dir.clone().multiplyScalar(10));
    tunnel.scale.y = 2;

    // координаты
    const {lat,lon} = toLatLon(point);
    const anti = antipode(lat,lon);

    document.getElementById("info").innerHTML =
      `📍 ${lat.toFixed(2)}, ${lon.toFixed(2)}<br>
       🌍 Opposite: ${anti.lat.toFixed(2)}, ${anti.lon.toFixed(2)}`;
  }
});

function animate(){
  requestAnimationFrame(animate);
  renderer.render(scene,camera);
}
animate();
</script>

</body>
</html>
